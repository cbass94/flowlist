services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis (sessions + job queue) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    # DATABASE_URL and REDIS_URL are set directly in .env with URL-encoded
    # passwords. Do NOT reassemble them here via ${POSTGRES_PASSWORD} /
    # ${REDIS_PASSWORD}: Docker Compose variable substitution does not
    # URL-encode values, so special characters (# @ $) in passwords would
    # corrupt the URL and cause connection failures.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app          # live-reload in dev; remove for prod
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── ARQ background worker (same image, different entrypoint) ──────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: arq app.workers.tasks.WorkerSettings
    env_file: .env
    # DATABASE_URL and REDIS_URL come from .env (see comment on backend service)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import arq"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── React frontend (Vite dev server) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules         # prevent host node_modules from clobbering container
    networks:
      - internal

  # ── Caddy reverse proxy ───────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external

  # ── Cloudflare Tunnel ─────────────────────────────────────────────────────────
  # Exposes the app at taskflowlist.com without opening inbound firewall ports.
  # Uses a locally-created tunnel (cloudflared tunnel create flowlist) with
  # credentials mounted from the Windows host. The config.yml points at caddy:80.
  # See docs/cloudflare-tunnel.md for setup details.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - C:/Users/bradl/.cloudflared:/etc/cloudflared:ro
    depends_on:
      - caddy
    networks:
      - internal
      - external

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
